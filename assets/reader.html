<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xara — Course Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.6);
      --accent-primary: #4ecca3;
      --accent-secondary: #45b7d1;
      --accent-warn: #f4a261;
      --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

    body {
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    .container { width: 100%; max-width: 500px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeIn 0.4s ease-out; }

    header { text-align: center; margin-bottom: 20px; }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(to right, #4ecca3, #45b7d1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { font-size: 0.85rem; color: var(--text-dim); margin-top: 4px; }

    /* --- Course selector --- */
    .course-selector {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 20px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .course-selector::-webkit-scrollbar { display: none; }

    .course-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-dim);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .course-pill:hover { border-color: var(--accent-secondary); color: var(--text-main); }
    .course-pill.active { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(78,204,163,0.1); }

    /* --- Cards --- */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--card-shadow);
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent-secondary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* --- Back button --- */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-dim);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    /* --- Course info bar --- */
    .info-bar { display: flex; gap: 16px; flex-wrap: wrap; }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; }
    .info-value { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
    .info-value.accent { color: var(--accent-primary); }

    /* --- Materials list --- */
    .materials-list { list-style: none; }
    .material-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 8px;
      border-radius: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s;
    }
    .material-item:last-child { border-bottom: none; }
    .material-item:hover, .material-item:active { background: rgba(255,255,255,0.06); }

    .material-num { font-size: 0.7rem; font-weight: 600; color: var(--accent-secondary); min-width: 20px; padding-top: 2px; }
    .material-info { flex: 1; min-width: 0; }
    .material-name { font-size: 0.82rem; color: var(--text-main); word-break: break-word; line-height: 1.4; }
    .material-type { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
    .material-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 8px; flex-shrink: 0; margin-top: 2px; }
    .badge-done { background: rgba(78,204,163,0.2); color: var(--accent-primary); }
    .badge-pending { background: rgba(244,162,97,0.2); color: var(--accent-warn); }
    .material-arrow { font-size: 0.7rem; color: var(--text-dim); flex-shrink: 0; padding-top: 3px; }

    /* --- Topics --- */
    .part-header {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 14px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .part-header:first-child { margin-top: 0; }

    .topic-item { margin-bottom: 4px; border-radius: 12px; overflow: hidden; border: 1px solid transparent; }
    .topic-item.has-sub { border-color: rgba(255,255,255,0.05); }

    .topic-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .topic-header:active { background: rgba(255,255,255,0.04); }

    .topic-num { font-size: 0.72rem; font-weight: 600; color: var(--accent-primary); min-width: 20px; padding-top: 2px; flex-shrink: 0; }
    .topic-name { flex: 1; font-size: 0.88rem; color: var(--text-main); line-height: 1.4; }
    .topic-status { font-size: 0.72rem; padding: 2px 7px; border-radius: 8px; flex-shrink: 0; margin-top: 1px; }
    .status-complete { background: rgba(78,204,163,0.2); color: var(--accent-primary); }
    .status-progress { background: rgba(69,183,209,0.2); color: var(--accent-secondary); }

    .chevron { font-size: 0.65rem; color: var(--text-dim); flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(90deg); }

    .subtopics { display: none; padding: 0 12px 10px 42px; }
    .subtopics.open { display: block; }
    .subtopic { font-size: 0.78rem; color: var(--text-dim); line-height: 1.6; padding: 1px 0; }
    .subtopic::before { content: '·  '; color: var(--accent-primary); font-weight: 600; }

    /* --- Markdown content renderer --- */
    .md-content {
      font-size: 0.88rem;
      line-height: 1.75;
      color: var(--text-main);
    }
    .md-content h1 {
      font-size: 1.2rem; font-weight: 600;
      color: var(--accent-primary);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(78,204,163,0.3);
    }
    .md-content h2 {
      font-size: 1.05rem; font-weight: 600;
      color: var(--accent-secondary);
      margin: 18px 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .md-content h3 {
      font-size: 0.95rem; font-weight: 600;
      color: var(--accent-warn);
      margin: 14px 0 6px;
    }
    .md-content h4 {
      font-size: 0.88rem; font-weight: 600;
      color: var(--text-dim);
      margin: 12px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .md-content p { margin: 8px 0; }
    .md-content strong { color: #fff; font-weight: 600; }
    .md-content em { color: rgba(255,255,255,0.8); font-style: italic; }
    .md-content code {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--accent-primary);
    }
    .md-content pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .md-content pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.8rem;
      color: var(--accent-primary);
      line-height: 1.6;
    }
    .md-content ul, .md-content ol { padding-left: 20px; margin: 6px 0; }
    .md-content li { margin: 3px 0; }
    .md-content ul li::marker { color: var(--accent-primary); }
    .md-content ol li::marker { color: var(--accent-secondary); font-weight: 600; }
    .md-content blockquote {
      border-left: 3px solid var(--accent-secondary);
      margin: 10px 0;
      padding: 8px 14px;
      background: rgba(69,183,209,0.08);
      border-radius: 0 8px 8px 0;
      color: rgba(255,255,255,0.8);
    }
    .md-content hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 16px 0;
    }
    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 0.8rem;
      overflow-x: auto;
      display: block;
    }
    .md-content th {
      background: rgba(78,204,163,0.12);
      color: var(--accent-primary);
      padding: 7px 10px;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 600;
      white-space: nowrap;
    }
    .md-content td {
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.06);
      vertical-align: top;
      line-height: 1.5;
    }
    .md-content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* --- Material view header --- */
    .material-header {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--glass-border);
    }
    .material-header-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .material-header-meta { font-size: 0.75rem; color: var(--text-dim); }

    /* --- Loading / error --- */
    .loading { text-align: center; padding: 32px 16px; color: var(--text-dim); font-size: 0.88rem; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { text-align: center; padding: 24px 16px; color: #e76f51; font-size: 0.85rem; line-height: 1.6; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="page-title">Course Reader</h1>
      <div class="subtitle" id="subtitle">Choose a course to explore</div>
    </header>

    <div class="course-selector" id="course-selector"></div>
    <div id="content">
      <div class="card">
        <div class="loading"><div class="spinner"></div>Loading course data...</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'xara_tutor_v1';
    // reader.html is in assets/ — courses/ is a sibling folder: assets/courses/
    const REMOTE_PATH = 'https://raw.githubusercontent.com/Mbosinwa/xara-university-tutor-google-ai-edge/main/assets/courses';

    let currentSlug = null; // tracks active course for back navigation

    async function fetchCourseFile(slug, filePath) {
      // 1. Try GitHub (always latest)
      try {
        const r = await fetch(`${REMOTE_PATH}/${slug}/${filePath}`);
        if (r.ok) return r.text();
      } catch (_) {}
      // 2. Try localStorage cache (populated by the AI chat on previous online sessions)
      try {
        const store = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        const cached = store.fileCache?.[slug]?.[filePath];
        if (cached) return cached;
      } catch (_) {}
      throw new Error('Not available offline. Open a chat session with internet to cache this content first.');
    }

    const COURSE_META = {
      'artificial-intelligence':          { code: 'CMS707', name: 'Artificial Intelligence' },
      'data-communication-and-networks':  { code: 'CMS703', name: 'Data Comms & Networks' },
      'operating-systems':                { code: 'CMS701', name: 'Operating Systems' },
      'programming-languages':            { code: 'CMS705', name: 'Programming Languages' },
      'compiler-construction':            { code: 'CMS709', name: 'Compiler Construction' },
      'system-analysis-and-design':       { code: 'CMS711', name: 'System Analysis & Design' }
    };
    const COURSE_SLUGS = Object.keys(COURSE_META);

    function getStore() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch (e) { return {}; }
    }

    // ── Markdown → HTML renderer ─────────────────────────────────────────────

    function mdToHtml(raw) {
      // Strip YAML frontmatter
      let text = raw.replace(/^---[\s\S]*?---\s*\n?/, '');

      const lines = text.split('\n');
      const out = [];
      let inCode = false, codeLang = '', codeLines = [];
      let inTable = false, tableRows = [];
      let listStack = []; // [{type:'ul'|'ol', indent:N}]

      function flushTable() {
        if (!tableRows.length) return;
        let html = '<table>';
        tableRows.forEach((row, i) => {
          const cells = row.split('|').map(c => c.trim()).filter((c, j, a) => j > 0 && j < a.length - 1);
          if (i === 0) {
            html += '<tr>' + cells.map(c => `<th>${inlinemd(c)}</th>`).join('') + '</tr>';
          } else if (i === 1 && row.match(/^[|\s\-:]+$/)) {
            // separator row — skip
          } else {
            html += '<tr>' + cells.map(c => `<td>${inlinemd(c)}</td>`).join('') + '</tr>';
          }
        });
        html += '</table>';
        out.push(html);
        tableRows = [];
        inTable = false;
      }

      function flushLists() {
        while (listStack.length) {
          out.push(`</${listStack.pop().type}>`);
        }
      }

      function inlinemd(s) {
        return s
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>')
          .replace(/_(.+?)_/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>');
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code fence
        const fenceMatch = line.match(/^```(\w*)/);
        if (fenceMatch && !inCode) {
          flushLists(); flushTable();
          inCode = true; codeLang = fenceMatch[1]; codeLines = [];
          continue;
        }
        if (inCode) {
          if (line.match(/^```/)) {
            out.push(`<pre><code>${codeLines.map(l =>
              l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            ).join('\n')}</code></pre>`);
            inCode = false; codeLines = [];
          } else {
            codeLines.push(line);
          }
          continue;
        }

        // Table row
        if (line.match(/^\|.+\|/)) {
          flushLists();
          if (!inTable) inTable = true;
          tableRows.push(line);
          continue;
        } else if (inTable) {
          flushTable();
        }

        // HR
        if (line.match(/^[-*_]{3,}\s*$/)) {
          flushLists(); out.push('<hr>'); continue;
        }

        // Headings
        const hMatch = line.match(/^(#{1,4})\s+(.+)/);
        if (hMatch) {
          flushLists();
          const lvl = hMatch[1].length;
          out.push(`<h${lvl}>${inlinemd(hMatch[2])}</h${lvl}>`);
          continue;
        }

        // Blockquote
        if (line.match(/^>\s?/)) {
          flushLists();
          out.push(`<blockquote>${inlinemd(line.replace(/^>\s?/, ''))}</blockquote>`);
          continue;
        }

        // Unordered list
        const ulMatch = line.match(/^(\s*)[*\-+]\s+(.+)/);
        if (ulMatch) {
          const indent = ulMatch[1].length;
          const text = inlinemd(ulMatch[2]);
          const top = listStack[listStack.length - 1];
          if (!top || top.type !== 'ul' || top.indent !== indent) {
            if (top && indent > top.indent) {
              out.push('<ul>'); listStack.push({ type: 'ul', indent });
            } else {
              while (listStack.length && listStack[listStack.length - 1].indent >= indent) {
                out.push(`</${listStack.pop().type}>`);
              }
              out.push('<ul>'); listStack.push({ type: 'ul', indent });
            }
          }
          out.push(`<li>${text}</li>`);
          continue;
        }

        // Ordered list
        const olMatch = line.match(/^(\s*)\d+\.\s+(.+)/);
        if (olMatch) {
          const indent = olMatch[1].length;
          const text = inlinemd(olMatch[2]);
          const top = listStack[listStack.length - 1];
          if (!top || top.type !== 'ol' || top.indent !== indent) {
            while (listStack.length && listStack[listStack.length - 1].indent >= indent) {
              out.push(`</${listStack.pop().type}>`);
            }
            out.push('<ol>'); listStack.push({ type: 'ol', indent });
          }
          out.push(`<li>${text}</li>`);
          continue;
        }

        // End lists on blank or non-list line
        if (listStack.length && !line.match(/^\s+/)) flushLists();

        // Blank line → paragraph break
        if (!line.trim()) { out.push('<p></p>'); continue; }

        // Plain paragraph
        out.push(`<p>${inlinemd(line)}</p>`);
      }

      flushLists(); flushTable();
      return out.join('\n');
    }

    // ── Course structure parsers ──────────────────────────────────────────────

    function parseFrontmatter(text) {
      const match = text.match(/^---\s*\n([\s\S]*?)\n---/);
      if (!match) return {};
      const result = {};
      for (const line of match[1].split('\n')) {
        const [key, ...rest] = line.split(':');
        if (key && rest.length) result[key.trim()] = rest.join(':').trim();
      }
      return result;
    }

    function parseMaterialsTable(text) {
      const section = text.match(/## Materials Index([\s\S]*?)(?=\n## |$)/);
      if (!section) return [];
      const rows = section[1].match(/^\|[^|\n]+\|[^|\n]+\|[^|\n]+\|[^|\n]+\|/gm) || [];
      return rows
        .filter(r => !r.match(/^[|\s\-:]+$/))
        .filter(r => !r.match(/Material.*Type.*Status/i))
        .map(r => {
          const cols = r.split('|').map(c => c.trim()).filter(Boolean);
          return { num: cols[0] || '', filename: cols[1] || '', type: cols[2] || '', status: (cols[3] || '').includes('✓') };
        });
    }

    function parseTopics(text) {
      const section = text.match(/## Topics([\s\S]*?)(?=\n## |$)/);
      if (!section) return [];
      const lines = section[1].split('\n');
      const parts = [];
      let currentPart = null, currentTopic = null;

      for (const raw of lines) {
        const line = raw.trimEnd();
        if (line.match(/^###\s/)) {
          currentPart = { label: line.replace(/^###\s+/, ''), topics: [] };
          parts.push(currentPart); currentTopic = null; continue;
        }
        const topicMatch = line.match(/^\d+\.\s+\*{0,2}(.+?)\*{0,2}\s*$/);
        if (topicMatch) {
          if (!currentPart) { currentPart = { label: null, topics: [] }; parts.push(currentPart); }
          currentTopic = { num: line.match(/^(\d+)\./)[1], name: topicMatch[1], subtopics: [] };
          currentPart.topics.push(currentTopic); continue;
        }
        const subMatch = line.match(/^\s{2,}-\s+(.+)/);
        if (subMatch && currentTopic) {
          currentTopic.subtopics.push(subMatch[1].replace(/\*{1,2}(.+?)\*{1,2}/g, '$1'));
        }
      }
      return parts;
    }

    // ── Renderers ─────────────────────────────────────────────────────────────

    function renderInfoCard(fm, materials) {
      return `
        <div class="card">
          <div class="card-title"><span>📖</span> Course Info</div>
          <div class="info-bar">
            <div class="info-item"><span class="info-label">Code</span><span class="info-value accent">${fm.courseCode || '—'}</span></div>
            <div class="info-item"><span class="info-label">Status</span><span class="info-value">${fm.status || '—'}</span></div>
            <div class="info-item"><span class="info-label">Materials</span><span class="info-value">${materials.length || fm.materialsCount || '—'}</span></div>
            <div class="info-item"><span class="info-label">Updated</span><span class="info-value">${fm.lastUpdated || '—'}</span></div>
          </div>
        </div>`;
    }

    function renderMaterialsCard(slug, materials) {
      if (!materials.length) return '';
      const items = materials.map(m => `
        <li class="material-item" onclick="openMaterial('${slug}', 'materials/${m.filename}', '${m.filename.replace(/'/g,"\\'")}', '${m.type.replace(/'/g,"\\'")}')">
          <span class="material-num">${m.num}</span>
          <div class="material-info">
            <div class="material-name">${m.filename}</div>
            <div class="material-type">${m.type}</div>
          </div>
          <span class="material-badge ${m.status ? 'badge-done' : 'badge-pending'}">${m.status ? '✓' : '…'}</span>
          <span class="material-arrow">▶</span>
        </li>`).join('');
      return `
        <div class="card">
          <div class="card-title"><span>📂</span> Materials — tap to read</div>
          <ul class="materials-list">${items}</ul>
        </div>`;
    }

    function renderTopicsCard(parts, progressByTopic) {
      if (!parts.length) return '';
      let topicsHtml = '', total = 0;

      for (const part of parts) {
        if (part.label) topicsHtml += `<div class="part-header">${part.label}</div>`;
        for (const topic of part.topics) {
          total++;
          const prog = progressByTopic[topic.name] || progressByTopic[topic.name.toLowerCase()];
          let statusClass = '', statusText = '';
          if (prog?.status === 'complete') { statusClass = 'status-complete'; statusText = '✓'; }
          else if (prog) { statusClass = 'status-progress'; statusText = '→'; }

          const hasSub = topic.subtopics.length > 0;
          topicsHtml += `
            <div class="topic-item ${hasSub ? 'has-sub' : ''}">
              <div class="topic-header" onclick="toggleTopic(${total})">
                <span class="topic-num">${topic.num}</span>
                <span class="topic-name">${topic.name}</span>
                ${statusText ? `<span class="topic-status ${statusClass}">${statusText}</span>` : ''}
                ${hasSub ? `<span class="chevron" id="chev-${total}">▶</span>` : ''}
              </div>
              ${hasSub ? `<div class="subtopics" id="sub-${total}">${
                topic.subtopics.map(s => `<div class="subtopic">${s}</div>`).join('')
              }</div>` : ''}
            </div>`;
        }
      }
      return `<div class="card"><div class="card-title"><span>🗂️</span> Topics (${total})</div>${topicsHtml}</div>`;
    }

    function toggleTopic(idx) {
      const sub = document.getElementById('sub-' + idx);
      const chev = document.getElementById('chev-' + idx);
      if (!sub) return;
      const open = sub.classList.toggle('open');
      if (chev) chev.classList.toggle('open', open);
    }

    // ── Material viewer ───────────────────────────────────────────────────────

    async function openMaterial(slug, filePath, displayName, type) {
      const content = document.getElementById('content');
      const courseName = COURSE_META[slug]?.name || slug;

      // Show loading
      document.getElementById('course-selector').style.display = 'none';
      content.innerHTML = `<div class="card"><div class="loading"><div class="spinner"></div>Loading material...</div></div>`;
      document.getElementById('page-title').textContent = 'Reading';
      document.getElementById('subtitle').textContent = displayName;

      try {
        const text = await fetchCourseFile(slug, filePath);
        const html = mdToHtml(text);

        content.innerHTML = `
          <button class="back-btn" onclick="backToCourse()">← Back to ${courseName}</button>
          <div class="card animate">
            <div class="material-header">
              <div class="material-header-title">${displayName}</div>
              <div class="material-header-meta">${type} · ${courseName}</div>
            </div>
            <div class="md-content">${html}</div>
          </div>`;

      } catch (e) {
        content.innerHTML = `
          <button class="back-btn" onclick="backToCourse()">← Back to ${courseName}</button>
          <div class="card">
            <div class="error-state">
              Could not load this material.<br>
              <small style="color:var(--text-dim)">${e.message}</small>
            </div>

          </div>`;
      }
    }

    function backToCourse() {
      document.getElementById('course-selector').style.display = 'flex';
      document.getElementById('page-title').textContent = 'Course Reader';
      loadCourse(currentSlug);
    }

    // ── Course overview ───────────────────────────────────────────────────────

    async function loadCourse(slug) {
      currentSlug = slug;
      const content = document.getElementById('content');
      content.innerHTML = `<div class="card"><div class="loading"><div class="spinner"></div>Loading ${COURSE_META[slug]?.name || slug}...</div></div>`;

      try {
        const text = await fetchCourseFile(slug, 'course-structure.md');
        const fm = parseFrontmatter(text);
        const materials = parseMaterialsTable(text);
        const parts = parseTopics(text);
        const progressByTopic = getStore().progress?.[slug] || {};

        document.getElementById('subtitle').textContent =
          `${fm.courseName || COURSE_META[slug]?.name} — ${fm.courseCode || ''}`;

        content.innerHTML = `<div class="animate">` +
          renderInfoCard(fm, materials) +
          renderMaterialsCard(slug, materials) +
          renderTopicsCard(parts, progressByTopic) +
          `</div>`;

      } catch (e) {
        content.innerHTML = `
          <div class="card">
            <div class="error-state">
              Could not load course data.<br>
              <small style="color:var(--text-dim)">${e.message}</small>
            </div>
          </div>`;
      }
    }

    // ── Course selector ───────────────────────────────────────────────────────

    function buildSelector(activeCourse) {
      const selector = document.getElementById('course-selector');
      selector.innerHTML = '';
      for (const slug of COURSE_SLUGS) {
        const pill = document.createElement('button');
        pill.className = 'course-pill' + (slug === activeCourse ? ' active' : '');
        pill.textContent = COURSE_META[slug].code;
        pill.title = COURSE_META[slug].name;
        pill.addEventListener('click', () => {
          document.querySelectorAll('.course-pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          loadCourse(slug);
        });
        selector.appendChild(pill);
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const initCourse = params.get('course') || getStore().activeCourse || COURSE_SLUGS[0];
    buildSelector(initCourse);
    loadCourse(initCourse);
  </script>
</body>
</html>
