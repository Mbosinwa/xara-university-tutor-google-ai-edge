<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
  <div id="status" style="font-family: sans-serif; color: #666; padding: 20px;">Xara Engine Active...</div>
  <script>
    const STORAGE_KEY = 'xara_tutor_v1';
    const MAX_CHARS = 10000; 
    const COURSES_PATH = 'https://raw.githubusercontent.com/Mbosinwa/xara-university-tutor/main/assets/courses';

    // --- Helper: Safe Storage ---
    const getStore = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } 
      catch (e) { return {}; }
    };
    const saveStore = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

    // --- Action: List Courses (Hardcoded for Speed) ---
    function listCourses() {
      const store = getStore();
      const active = store.activeCourse ? `\n\nActive: **${store.activeCourse}**` : '';
      return {
        result: "Enrolled Courses:\n1. AI (CMS707)\n2. OS (CMS701)\n3. Networks (CMS703)\n4. Programming (CMS705)\n5. Compilers (CMS709)\n6. Design (CMS711)" + active
      };
    }

    // --- Action: Load Files (With proper error catching) ---
    async function loadRemoteFile(path) {
      try {
        const resp = await fetch(path);
        if (!resp.ok) return `Error: File not found at ${path}`;
        let text = await resp.text();
        return text.length > MAX_CHARS ? text.substring(0, MAX_CHARS) + "\n...[Truncated]" : text;
      } catch (e) {
        return `Network Error: ${e.message}`;
      }
    }

    // --- THE CRITICAL DISPATCHER FIX ---
    window.run_js_action = async (input) => {
      const status = document.getElementById('status');
      try {
        // 1. Safe Parse: Handle String vs Object
        const data = (typeof input === 'string') ? JSON.parse(input) : input;
        status.innerText = `Executing: ${data.action}...`;

        let output;
        switch (data.action) {
          case 'list_courses':
            output = listCourses();
            break;

          case 'load_knowledge_map':
            const mapText = await loadRemoteFile(`${COURSES_PATH}/${data.course}/knowledge-map.md`);
            output = { result: mapText };
            break;

          case 'load_course':
            const structText = await loadRemoteFile(`${COURSES_PATH}/${data.course}/course-structure.md`);
            const store = getStore();
            store.activeCourse = data.course;
            saveStore(store);
            output = { result: structText };
            break;

          case 'load_material':
            const matText = await loadRemoteFile(`${COURSES_PATH}/${data.course}/materials/${data.filename}`);
            output = { result: matText };
            break;

          case 'get_progress':
            output = { result: "Progress tracking initialized. No data yet." };
            break;

          default:
            output = { error: `Action ${data.action} not recognized.` };
        }

        status.innerText = `Last Action: ${data.action} (Success)`;
        return output; // Return the Object directly

      } catch (e) {
        status.innerText = `Error: ${e.message}`;
        return { error: `Dispatcher Crash: ${e.message}` };
      }
    };

    // Compatibility backup for older SDKs
    window.ai_edge_gallery_get_result = window.run_js_action;
  </script>
</body>
</html>
